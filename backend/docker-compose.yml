version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taoji_postgres
    environment:
      POSTGRES_DB: taoji_db
      POSTGRES_USER: taoji
      POSTGRES_PASSWORD: taoji123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/migrations/001-initial-schema.sql:/docker-entrypoint-initdb.d/001-initial-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taoji -d taoji_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taoji_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taoji_backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: taoji
      DATABASE_PASS: taoji123
      DATABASE_NAME: taoji_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      APP_PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports

volumes:
  postgres_data:
  redis_data:
