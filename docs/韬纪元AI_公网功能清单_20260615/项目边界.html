<style type="text/css">.ritz .waffle a { color: inherit; }.ritz .waffle .s1{border-bottom:1px SOLID #dde7f3;border-right:1px SOLID #dde7f3;background-color:#156082;text-align:left;font-weight:bold;color:#172033;font-family:docs-Carlito,Arial;font-size:11pt;vertical-align:top;white-space:normal;overflow:hidden;word-wrap:break-word;direction:ltr;padding:0px 3px 0px 3px;}.ritz .waffle .s3{border-bottom:1px SOLID #e5eaf2;border-right:1px SOLID #e5eaf2;background-color:#ffffff;text-align:left;color:#172033;font-family:"Microsoft Yahei";font-size:10pt;vertical-align:top;white-space:normal;overflow:hidden;word-wrap:break-word;direction:ltr;padding:0px 3px 0px 3px;}.ritz .waffle .s2{border-bottom:1px SOLID #e5eaf2;border-right:1px SOLID #e5eaf2;background-color:#c1e4f5;text-align:left;color:#172033;font-family:"Microsoft Yahei";font-size:10pt;vertical-align:top;white-space:normal;overflow:hidden;word-wrap:break-word;direction:ltr;padding:0px 3px 0px 3px;}.ritz .waffle .s0{border-bottom:1px SOLID #dde7f3;background-color:#185fa5;text-align:left;font-weight:bold;color:#ffffff;font-family:docs-Carlito,Arial;font-size:16pt;vertical-align:top;white-space:normal;overflow:hidden;word-wrap:break-word;direction:ltr;padding:0px 3px 0px 3px;}</style><div class="ritz grid-container" dir="ltr"><table class="waffle no-grid" cellspacing="0" cellpadding="0"><thead><tr><th class="row-header freezebar-origin-ltr"></th><th id="1767077296C0" style="width:159px;" class="column-headers-background">A</th><th id="1767077296C1" style="width:759px;" class="column-headers-background">B</th></tr></thead><tbody><tr style="height: 33px"><th id="1767077296R0" style="height: 33px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 33px">1</div></th><td class="s0" colspan="2">边界与当前限制</td></tr><tr style="height: 19px"><th id="1767077296R1" style="height: 19px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 19px">2</div></th><td class="s1">主题</td><td class="s1">说明</td></tr><tr style="height: 19px"><th id="1767077296R2" style="height: 19px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 19px">3</div></th><td class="s2">平台定位</td><td class="s2">AI助贷报告生产与资料作业平台，不是贷款超市或放款平台</td></tr><tr style="height: 19px"><th id="1767077296R3" style="height: 19px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 19px">4</div></th><td class="s3">资金边界</td><td class="s3">平台不提供资金，不承诺额度，不表达审批通过</td></tr><tr style="height: 19px"><th id="1767077296R4" style="height: 19px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 19px">5</div></th><td class="s2">AI边界</td><td class="s2">AI用于资料识别、报告草稿、字段预填和材料整理，最终需顾问人工复核</td></tr><tr style="height: 19px"><th id="1767077296R5" style="height: 19px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 19px">6</div></th><td class="s3">银行边界</td><td class="s3">平台维护银行材料要求和沟通材料，不直接对接银行审批流程</td></tr><tr style="height: 19px"><th id="1767077296R6" style="height: 19px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 19px">7</div></th><td class="s2">C端边界</td><td class="s2">C端用于资料采集、授权、进度查看和顾问协作，不让客户自助盲选银行</td></tr><tr style="height: 19px"><th id="1767077296R7" style="height: 19px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 19px">8</div></th><td class="s3">商业化边界</td><td class="s3">收费来自报告/材料整理调用、套餐、机构会员和API调用能力，不突出银行返佣</td></tr><tr style="height: 19px"><th id="1767077296R8" style="height: 19px;" class="row-headers-background"><div class="row-header-wrapper" style="line-height: 19px">9</div></th><td class="s2">当前限制</td><td class="s2">公网为静态原型，所有上传、导出、扣次、API、微信联系均为Mock演示</td></tr></tbody></table></div>
