spring:
  application:
    name: taoji-backend
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:taoji_db}
    username: ${DATABASE_USER:taoji}
    password: ${DATABASE_PASS:taoji123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jooq:
    sql-dialect: POSTGRES
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

server:
  port: ${SERVER_PORT:3000}
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET:changeme-very-long-secret-key-for-hs256-at-least-256bits}
  expiration: ${JWT_EXPIRES_MS:604800000}  # 7 days in ms

upload:
  dir: ${UPLOAD_DIR:./uploads}
  url-prefix: ${UPLOAD_URL_PREFIX:http://localhost:3000/uploads}

wechat:
  app-id: ${WECHAT_APP_ID:wxc9ebcb4c289511eb}
  app-secret: ${WECHAT_APP_SECRET:}

ai:
  api-url: ${AI_API_URL:https://api.openai.com/v1}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-4o-mini}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
  default-produces-media-type: application/json

logging:
  level:
    com.taoji: DEBUG
    org.jooq.tools.LoggerListener: DEBUG
